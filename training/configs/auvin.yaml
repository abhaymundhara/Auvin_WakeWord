wake_word: auvin
sample_rate: 16000
positives:
  phrases:
  - aw win
  - aw-win
  - hey aw win
  - hey aw-win
  - oh aw win
  - okay aw win
  target_count: 18000
hard_negatives:
  phrases:
  - oven
  - often
  - avin
  - a vine
  - oh vin
  - hey oven
  - hey often
  - hey avin
  - hey siri
  - hey google
  - hey alexa
  - Owen
  - a win
  - I win
  - we win
  - all win
  - awning
  target_count: 10000
random_negatives:
  dataset: openslr/librispeech_asr
  subset: clean
  split: train.100
  target_count: 15000
piper_voices:
- en_US-amy-medium
- en_US-ryan-high
- en_US-lessac-medium
- en_US-hfc_female-medium
- en_US-libritts-high
- en_GB-alan-medium
- en_GB-jenny_dioco-medium
augmentation:
  speed_jitter: 0.15
  pitch_semitones: 2.0
  gain_db: 6.0
  min_duration_sec: 2.4
  background_noise_probability: 0.25
  background_snr_db_min: 15.0
  background_snr_db_max: 30.0
training:
  hard_negative_weight: 60.0
  field_negative_weight: 200.0
  epochs: 35
  patience: 8
  batch_size: 1024
  learning_rate: 0.001
gates:
  recall_min: 0.97
  real_speech_fpr_max: 0.0005
  hard_negative_fpr_max: 0.03
  mean_pos_score_min: 0.95
  mean_neg_score_max: 0.02
